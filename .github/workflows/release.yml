name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    name: Commitizen Release
    runs-on: ubuntu-latest
    needs: ci
    # Prevent infinite loop from bump commits
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Force branch to workflow sha
        run: git reset --hard ${{ github.sha }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create changelog
        id: bump
        run: |
          # Try to bump; if no commits warrant a bump, exit gracefully
          if cz bump --changelog --yes 2>&1 | tee bump_output.txt; then
            # cz bump can exit 0 but still not bump (NO_COMMITS_TO_BUMP)
            if grep -qE "NoneIncrementExit|NO_COMMITS_TO_BUMP" bump_output.txt; then
              echo "No version bump needed"
              echo "released=false" >> $GITHUB_OUTPUT
            else
              echo "released=true" >> $GITHUB_OUTPUT
              echo "version=$(cz version -p)" >> $GITHUB_OUTPUT
              echo "tag=v$(cz version -p)" >> $GITHUB_OUTPUT
            fi
          else
            if grep -qE "NoneIncrementExit|NO_COMMITS_TO_BUMP" bump_output.txt; then
              echo "No version bump needed"
              echo "released=false" >> $GITHUB_OUTPUT
            else
              cat bump_output.txt
              exit 1
            fi
          fi

      - name: Push changes
        if: steps.bump.outputs.released == 'true'
        run: |
          git push origin ${{ github.ref_name }}
          git push origin --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.released == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      released: ${{ steps.bump.outputs.released || 'false' }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}

  sign:
    name: Build and Sign Extension
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.released == 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Sign extension with Mozilla
        run: npm run sign
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}

      - name: Rename signed XPI
        run: |
          VERSION=${{ needs.release.outputs.version }}
          SIGNED_XPI=$(find web-ext-artifacts -name "*.xpi" -type f | head -n 1)
          if [ -n "$SIGNED_XPI" ]; then
            mv "$SIGNED_XPI" "web-ext-artifacts/gitlab-notifier-${VERSION}-signed.xpi"
          fi

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: |
            web-ext-artifacts/gitlab-notifier-*-signed.xpi
            web-ext-artifacts/gitlab_notifier-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-tag:
    name: Release from Tag
    runs-on: ubuntu-latest
    needs: ci
    # Only run on manual tag pushes (not from automated release job)
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Sign extension with Mozilla
        run: npm run sign
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}

      - name: Rename signed XPI
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SIGNED_XPI=$(find web-ext-artifacts -name "*.xpi" -type f | head -n 1)
          if [ -n "$SIGNED_XPI" ]; then
            mv "$SIGNED_XPI" "web-ext-artifacts/gitlab-notifier-${VERSION}-signed.xpi"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            web-ext-artifacts/gitlab-notifier-*-signed.xpi
            web-ext-artifacts/gitlab_notifier-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
